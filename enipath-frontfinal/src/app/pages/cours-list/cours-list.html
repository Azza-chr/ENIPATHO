<div style="padding: 20px;">
  <h2>Test - Liste des Cours</h2>
  <p>Nombre de cours : {{ cours.length }}</p>

  @for (c of cours; track c.idCours) {
    <div style="border: 1px solid #ccc; margin: 10px; padding: 10px;">
      <h3>{{ c.titre }}</h3>
      <p>{{ c.description }}</p>
      <p>Type : {{ c.typeContenu }}</p>
    </div>
  }

  @if (cours.length === 0) {
    <p>Aucun cours pour le moment.</p>
  }
</div>
