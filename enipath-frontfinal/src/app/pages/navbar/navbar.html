<nav class="nav" [class.nav--scrolled]="scrolled">

  <!-- Brand -->
  <a class="nav-brand" routerLink="/formations">
    <div class="nav-brand-logo">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" width="40" height="40">
        <rect width="40" height="40" rx="10" fill="url(#ng)"/>
        <path d="M12 28 L20 10 L28 28" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M14.5 22 H25.5" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
        <circle cx="20" cy="10" r="2.2" fill="#FDBA74"/>
        <defs>
          <linearGradient id="ng" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#1a3a5c"/>
            <stop offset="100%" stop-color="#d4711e"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <div class="nav-brand-wordmark">
      <span class="nav-brand-name">ENIPATH</span>
      <span class="nav-brand-tagline">Plateforme pédagogique</span>
    </div>
  </a>

  <!-- Separator -->
  <div class="nav-sep"></div>

  <!-- Links -->
  <ul class="nav-links">
    <li>
      <a class="nav-link" routerLink="/formations" routerLinkActive="nav-link--active" [routerLinkActiveOptions]="{exact:false}">
        <span class="nav-link-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
          </svg>
        </span>
        <span>Formations</span>
      </a>
    </li>
    <li>
      <a class="nav-link" routerLink="/mes-badges" routerLinkActive="nav-link--active">
        <span class="nav-link-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="8" r="6"/>
            <path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/>
          </svg>
        </span>
        <span>Badges</span>
      </a>
    </li>
    <li>
      <a class="nav-link" routerLink="/mes-certifications" routerLinkActive="nav-link--active">
        <span class="nav-link-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
        </span>
        <span>Certifications</span>
      </a>
    </li>
    <li>
      <a class="nav-link nav-link--ai" routerLink="/ai-landing" routerLinkActive="nav-link--active">
        <span class="nav-link-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
        </span>
        <span>Assistant IA</span>
        <span class="nav-link-pip"></span>
      </a>
    </li>
  </ul>

  <!-- Spacer -->
  <div class="nav-spacer"></div>

  <!-- Right -->
  <div class="nav-right">

    <!-- Theme -->
    <button class="nav-icon-btn" title="Changer le thème" (click)="toggleTheme()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>

    <!-- Notifications -->
    <button class="nav-icon-btn nav-notif-btn" title="Notifications">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span class="nav-notif-dot"></span>
    </button>

    <!-- Divider -->
    <div class="nav-vdiv"></div>

    <!-- User -->
    <button class="nav-user">
      <div class="nav-avatar">
        <span class="nav-avatar-letter">{{ initials }}</span>
        <span class="nav-avatar-ring"></span>
      </div>
      <div class="nav-user-text">
        <span class="nav-user-name">{{ userName }}</span>
        <span class="nav-user-role">{{ userRole }}</span>
      </div>
      <svg class="nav-user-chevron" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </button>

  </div>
</nav>
