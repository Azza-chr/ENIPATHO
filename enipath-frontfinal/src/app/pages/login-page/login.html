<div class="page">

  <div class="grid-bg"></div>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <!-- Top bar — identique role-topbar de la plateforme -->
  <header class="role-topbar">
    <div class="role-topbar__brand">
      <a class="role-topbar__logo-link" routerLink="/">
        <img src="assets/image/logo-enipath.png" alt="Enipath logo" />
        <strong>ENIPATH</strong>
      </a>
    </div>
    <button class="btn-icon-action" (click)="toggleTheme()" [attr.aria-label]="isDark ? 'Mode clair' : 'Mode sombre'">
      <svg *ngIf="!isDark" width="16" height="16" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4"/>
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
      </svg>
      <svg *ngIf="isDark" width="16" height="16" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </header>

  <main>
    <div class="card-wrap">
      <div class="card">

        <div class="card-header">
          <h1 class="card-title">Bon retour</h1>
          <p class="card-sub">Connectez-vous pour accéder à votre parcours.</p>
        </div>

        <div *ngIf="errorMessage" class="error-box">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            style="display:inline;vertical-align:middle;margin-right:6px;">
            <circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>
          </svg>
          {{ errorMessage }}
        </div>

        <form (ngSubmit)="onSubmit()">

          <div class="field">
            <label for="email">Adresse e-mail</label>
            <div class="input-wrap">
              <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
              </svg>
              <input type="email" id="email" [(ngModel)]="email" name="email"
                placeholder="vous@enicar.tn" autocomplete="email"
                required [disabled]="isLoading">
            </div>
          </div>

          <div class="field">
            <label for="password">Mot de passe</label>
            <div class="input-wrap">
              <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input type="password" id="password" [(ngModel)]="password" name="password"
                placeholder="••••••••" autocomplete="current-password"
                required [disabled]="isLoading">
            </div>
          </div>

          <button type="submit" class="btn-submit" [disabled]="isLoading">
            <div *ngIf="isLoading" class="spinner"></div>
            <ng-container *ngIf="!isLoading">
              Se connecter <span class="arrow">→</span>
            </ng-container>
            <ng-container *ngIf="isLoading">Connexion en cours…</ng-container>
          </button>

        </form>

        <div class="forgot-row">
          <a class="forgot">Mot de passe oublié ?</a>
        </div>

      </div>

    </div>
  </main>

</div>
